version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/packages/*"
      - "/apps/*"
    schedule:
      interval: "weekly"
    # 0 disables version-update PRs; security updates are unaffected
    open-pull-requests-limit: 0
    groups:
      security:
        applies-to: security-updates
        patterns: ["*"]
